<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Table Layout</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page-shell">
    <h1>Basic Table Layout</h1>
    
    <table class="layout-table">
      <tr>
        <td colspan="2" class="table-header">Header and it is awesome</td>
      </tr>
      
      <tr>
        <td class="table-sidebar">Sidebar</td>
        <td class="table-content">
          <h2>Main Content</h2>
          <p>This layout uses a table to divide the page into areas.</p>
        </td>
      </tr>

      <tr>
        <td colspan="2" class="table-footer">Footer</td>
      </tr>
    </table>

  </div>
</body>
</html>
